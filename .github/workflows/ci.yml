name: OK_JSON Library CI

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get install -y build-essential valgrind cppcheck gcovr

      - name: Build library
        run: make

      - name: Run tests
        run: make test

      - name: Generate Code Coverage
        run: make coverage

      - name: Memory check with Valgrind
        run: valgrind --tool=memcheck --leak-check=full --show-leak-kinds=all --track-origins=yes --error-exitcode=1 ./test/ok_json_test_runner

      - name: Publish Coverage to GitHub Step Summary
        run: |
          echo "## Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          gcovr -r . >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run Cppcheck with MISRA Add-on
        run: |
          echo "## MISRA Compliance Results" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          
          # Temporarily disable 'exit on error' so we can safely close the markdown block
          set +e

          # Added test/ to the scan paths and --suppress=*:test/* to silence test-code warnings
          OUTPUT=$(cppcheck --addon=misra.json --enable=all --error-exitcode=0 --checkers-report=checkers_report.txt --suppress=*:test/* --inline-suppr test/ok_json_tests.c 2>&1)
          EXIT_CODE=$?
          set -e
          
          # Append the results to the GitHub step summary
          echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Append the checkers report to the GitHub step summary
          echo "## Cppcheck Active Checkers Report" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat checkers_report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          # Print to the console so it still appears in the standard GitHub logs
          echo "$OUTPUT"
          
          # Exit with the Cppcheck status code to fail the build if necessary
          exit $EXIT_CODE

  fuzz:
    name: Run libFuzzer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Compile Fuzzer
        # Compile with Clang, enabling libfuzzer, ASan, and UBSan
        run: |
          clang -g -O1 -fsanitize=fuzzer,address,undefined \
                -Iinclude test/fuzz_target.c -o fuzzer

      - name: Run Fuzzer
        # Run for 60 seconds max. Fails the build if a crash/leak is found.
        # Restrict max_len to your parser's limit to optimize fuzzer time.
        run: ./fuzzer -max_total_time=10 -max_len=4096  

  formal-verification:
    name: Mathematical Proofs (Frama-C WP)
    runs-on: ubuntu-latest
    container:
      image: framac/frama-c:32.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Verify ACSL Contracts
        run: |
          # Run the Weakest Precondition (WP) plugin with Runtime Error (RTE) generation.
          # -cpp-extra-args ensures Frama-C understands your headers and C99 syntax.
          # -wp-fct restricts the mathematical proofs only to the functions we have annotated so far.
          frama-c \
            -cpp-extra-args="-I./include -std=c99" \
            -wp \
            -wp-rte \
            -wp-timeout 10 \
            -wp-fct okj_is_whitespace \
            src/ok_json.c
