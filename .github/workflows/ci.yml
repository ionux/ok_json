name: OK_JSON Library CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get install -y build-essential valgrind cppcheck

      - name: Build library
        run: make

      - name: Run tests
        run: make test

      - name: Memory check with Valgrind
        run: valgrind --tool=memcheck --leak-check=full --show-leak-kinds=all --track-origins=yes --error-exitcode=1 ./test/ok_json_test_runner

#      - name: Run Cppcheck with MISRA Add-on
#        run: cppcheck --addon=misra.json --enable=all --error-exitcode=1 --inline-suppr src/
